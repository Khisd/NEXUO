<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUO Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { inter: ['Inter','sans-serif'], geist: ['Geist','sans-serif'] }, colors: { brand: '#c6f91f', dark: { 900:'#05080A', 800:'#0B0F13', 700:'#0E1216', 500:'#141a20' } } } } }
    </script>
    <style>
        ::selection { background: rgba(198,249,31,0.3); color: #c6f91f; }
        body { font-family: 'Inter', sans-serif; background: #05080A; color: #fff; }
        .font-geist { font-family: 'Geist', sans-serif; }
        .glass { background: rgba(11,15,19,0.8); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); }
        .toast { transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.2,0.8,0.2,1); }
        .toast.show { transform: translateX(0); }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #c6f91f !important; box-shadow: 0 0 0 2px rgba(198,249,31,0.15); }
    </style>
</head>
<body class="antialiased">

<!-- ===== LOGIN SCREEN ===== -->
<div id="login-screen" class="min-h-screen flex items-center justify-center p-6">
    <div class="glass rounded-2xl p-8 w-full max-w-sm text-center">
        <div class="w-12 h-12 bg-brand/10 rounded-xl flex items-center justify-center mx-auto mb-6"><i data-lucide="shield" class="w-6 h-6 text-brand"></i></div>
        <h1 class="font-geist font-semibold text-xl mb-1">Staff Access</h1>
        <p class="text-sm text-white/40 mb-6">Area terbatas. Masukkan password.</p>
        <form onsubmit="handleLogin(event)">
            <input type="password" id="admin-password" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm text-white placeholder-white/20 mb-4" placeholder="Password">
            <button type="submit" class="w-full bg-brand text-black text-xs font-medium tracking-wide uppercase py-3.5 rounded-lg hover:bg-brand/90 transition-colors">Masuk</button>
        </form>
        <p id="login-error" class="text-xs text-red-400 mt-3 hidden">Password salah!</p>
        <a href="/" class="inline-block mt-6 text-xs text-white/30 hover:text-white/60 transition-colors">← Kembali ke Website</a>
    </div>
</div>

<!-- ===== DASHBOARD SCREEN ===== -->
<div id="dashboard-screen" class="hidden p-6 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-brand rounded-md flex items-center justify-center"><span class="text-black font-bold text-sm font-geist">N</span></div>
                <h1 class="font-geist font-semibold text-xl">NEXUO <span class="text-white/30 font-light text-sm">// ADMIN</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <a href="/" class="text-xs text-white/30 hover:text-white border border-white/10 px-3 py-1.5 rounded-lg transition-colors">← Website</a>
                <button onclick="handleLogout()" class="text-xs text-red-400 hover:text-red-300 border border-red-500/20 px-3 py-1.5 rounded-lg transition-colors">Logout</button>
            </div>
        </header>

        <div class="flex gap-4 mb-8 border-b border-white/5 pb-3">
            <button class="tab-btn text-sm font-medium text-brand border-b-2 border-brand pb-2 px-2" onclick="switchTab('orders')">Pesanan</button>
            <button class="tab-btn text-sm font-medium text-white/30 border-b-2 border-transparent pb-2 px-2 hover:text-white/60" onclick="switchTab('products')">Produk</button>
        </div>

        <!-- TAB ORDERS -->
        <div id="tab-orders">
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                <div class="glass rounded-xl p-4"><p class="text-[10px] text-white/40 uppercase tracking-wider">Revenue</p><p class="font-geist text-xl text-brand mt-1" id="statRevenue">Rp 0</p></div>
                <div class="glass rounded-xl p-4"><p class="text-[10px] text-white/40 uppercase tracking-wider">Orders</p><p class="font-geist text-xl mt-1" id="statTotal">0</p></div>
                <div class="glass rounded-xl p-4"><p class="text-[10px] text-white/40 uppercase tracking-wider">Pending</p><p class="font-geist text-xl text-yellow-400 mt-1" id="statPending">0</p></div>
                <div class="glass rounded-xl p-4"><p class="text-[10px] text-white/40 uppercase tracking-wider">Rejected</p><p class="font-geist text-xl text-red-400 mt-1" id="statRejected">0</p></div>
            </div>
            <div class="glass rounded-xl p-5 mb-8 h-64"><canvas id="adminChart"></canvas></div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead><tr class="border-b border-white/5 text-[10px] text-white/30 uppercase tracking-wider"><th class="p-3">Order ID</th><th class="p-3">Produk</th><th class="p-3">Total</th><th class="p-3">Email</th><th class="p-3">Bukti</th><th class="p-3">Status</th><th class="p-3 text-right">Aksi</th></tr></thead>
                    <tbody id="ordersTableBody" class="text-sm"></tbody>
                </table>
            </div>
        </div>

        <!-- TAB PRODUCTS -->
        <div id="tab-products" class="hidden">
            <div class="glass rounded-xl p-6 mb-8">
                <h3 class="font-geist font-semibold mb-4">Tambah Produk Baru</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <input type="text" id="pName" placeholder="Nama Produk" class="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm">
                    <input type="text" id="pPrice" placeholder="Harga (contoh: 249000)" class="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm">
                    <input type="text" id="pCategory" placeholder="Kategori (MQL5 / Python AI)" class="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm">
                    <input type="text" id="pFeatures" placeholder="Fitur (Pisah koma: Auto SL, Trend)" class="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm">
                    <input type="text" id="pLink" placeholder="Link Download (GDrive/Discord)" class="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm col-span-1 md:col-span-2">
                    <textarea id="pDesc" placeholder="Deskripsi Produk" class="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm h-20 col-span-1 md:col-span-2"></textarea>
                </div>
                <button onclick="addProduct()" class="bg-brand text-black text-xs font-semibold tracking-wider uppercase px-6 py-2.5 rounded-lg hover:bg-brand/90 transition-colors">Tambah Produk</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead><tr class="border-b border-white/5 text-[10px] text-white/30 uppercase tracking-wider"><th class="p-3">ID</th><th class="p-3">Nama</th><th class="p-3">Harga</th><th class="p-3">Kategori</th><th class="p-3 text-right">Aksi</th></tr></thead>
                    <tbody id="productsTableBody" class="text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal Bukti Bayar -->
<div id="proof-modal" class="fixed inset-0 bg-black/90 z-50 hidden items-center justify-center p-4 cursor-pointer" onclick="this.classList.add('hidden');this.classList.remove('flex')">
    <img id="proof-img" src="" class="max-w-full max-h-full rounded-lg">
</div>
<div id="toast-container" class="fixed top-6 right-6 z-[9999] flex flex-col gap-3"></div>

<script>
    const API_BASE = window.location.origin;
    let myChart = null;
    const ADMIN_PASSWORD = 'nexuo2026'; // GANTI PASSWORD KAMU DI SINI

    // ===== AUTH LOGIC =====
    function checkAuth() {
        const isAuth = sessionStorage.getItem('nexuo_auth');
        if (isAuth === 'true') {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            loadOrders(); lucide.createIcons();
        } else {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('dashboard-screen').classList.add('hidden');
        }
    }

    function handleLogin(e) {
        e.preventDefault();
        const pass = document.getElementById('admin-password').value;
        if (pass === ADMIN_PASSWORD) {
            sessionStorage.setItem('nexuo_auth', 'true');
            checkAuth();
        } else {
            document.getElementById('login-error').classList.remove('hidden');
            document.getElementById('admin-password').value = '';
        }
    }

    function handleLogout() {
        sessionStorage.removeItem('nexuo_auth');
        checkAuth();
    }

    // ===== TAB LOGIC =====
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('text-brand','border-brand'); b.classList.add('text-white/30','border-transparent'); });
        event.target.classList.add('text-brand','border-brand'); event.target.classList.remove('text-white/30','border-transparent');
        document.getElementById('tab-orders').classList.toggle('hidden', tab !== 'orders');
        document.getElementById('tab-products').classList.toggle('hidden', tab !== 'products');
        if(tab === 'orders') loadOrders(); else loadProducts();
    }

    // ===== ORDERS LOGIC =====
    async function loadOrders() {
        const res = await fetch(`${API_BASE}/api/orders`); const orders = await res.json();
        const approved = orders.filter(o => o.status === 'approved'); const pending = orders.filter(o => o.status === 'pending'); const rejected = orders.filter(o => o.status === 'rejected');
        const rev = approved.reduce((s,o) => s + (parseInt(o.price) || 0), 0);
        document.getElementById('statRevenue').textContent = 'Rp ' + rev.toLocaleString('id-ID');
        document.getElementById('statTotal').textContent = orders.length; document.getElementById('statPending').textContent = pending.length; document.getElementById('statRejected').textContent = rejected.length;

        document.getElementById('ordersTableBody').innerHTML = orders.map(o => {
            let st = o.status === 'pending' ? '<span class="text-[10px] bg-yellow-400/10 text-yellow-400 px-2 py-0.5 rounded">Pending</span>' : o.status === 'approved' ? '<span class="text-[10px] bg-green-400/10 text-green-400 px-2 py-0.5 rounded">Approved</span>' : '<span class="text-[10px] bg-red-400/10 text-red-400 px-2 py-0.5 rounded">Rejected</span>';
            let act = o.status === 'pending' ? `<button onclick="updStatus('${o.order_id}','approved')" class="text-[10px] bg-green-500/10 text-green-400 px-2 py-1 rounded hover:bg-green-500/20 mr-1">✓ Approve</button><button onclick="updStatus('${o.order_id}','rejected')" class="text-[10px] bg-red-500/10 text-red-400 px-2 py-1 rounded hover:bg-red-500/20">✕ Reject</button>` : '-';
            let proof = o.proof ? `<button onclick="viewProof('${o.proof}')" class="text-[10px] text-brand hover:underline">Lihat</button>` : '-';
            return `<tr class="border-b border-white/5 hover:bg-white/[0.02]"><td class="p-3 font-geist text-xs text-white/40">${o.order_id}</td><td class="p-3">${o.product_name}</td><td class="p-3 font-geist">Rp ${(parseInt(o.price) || 0).toLocaleString('id-ID')}</td><td class="p-3 text-white/60">${o.email}</td><td class="p-3">${proof}</td><td class="p-3">${st}</td><td class="p-3 text-right">${act}</td></tr>`;
        }).join('');

        const ctx = document.getElementById('adminChart').getContext('2d');
        const names = [...new Set(orders.map(o => o.product_name))];
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, { type: 'bar', data: { labels: names, datasets: [
            { label: 'Approved', data: names.map(n => orders.filter(o => o.product_name === n && o.status === 'approved').length), backgroundColor: 'rgba(198,249,31,0.7)' },
            { label: 'Pending', data: names.map(n => orders.filter(o => o.product_name === n && o.status === 'pending').length), backgroundColor: 'rgba(250,204,21,0.7)' }
        ]}, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: {stepSize: 1} } } } });
    }

    function viewProof(url) { document.getElementById('proof-img').src = url; const m = document.getElementById('proof-modal'); m.classList.remove('hidden'); m.classList.add('flex'); }
    async function updStatus(id, status) { await fetch(`${API_BASE}/api/orders`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({order_id: id, status}) }); showToast(`Order ${status}! Email terkirim.`); loadOrders(); }

    // ===== PRODUCTS LOGIC =====
    async function loadProducts() {
        const res = await fetch(`${API_BASE}/api/products`); const prods = await res.json();
        document.getElementById('productsTableBody').innerHTML = prods.map(p => 
            `<tr class="border-b border-white/5 hover:bg-white/[0.02]"><td class="p-3 text-white/40">${p.id}</td><td class="p-3">${p.name}</td><td class="p-3 font-geist">Rp ${(parseInt(p.price) || 0).toLocaleString('id-ID')}</td><td class="p-3 text-white/60">${p.category || '-'}</td><td class="p-3 text-right"><button onclick="delProduct(${p.id})" class="text-[10px] bg-red-500/10 text-red-400 px-2 py-1 rounded hover:bg-red-500/20">Hapus</button></td></tr>`
        ).join('');
    }

    async function addProduct() {
        const name = document.getElementById('pName').value; 
        const price = document.getElementById('pPrice').value; 
        const category = document.getElementById('pCategory').value; 
        const features = document.getElementById('pFeatures').value; 
        const download_link = document.getElementById('pLink').value; 
        const description = document.getElementById('pDesc').value;
        
        if(!name || !price) return showToast('Nama & Harga wajib', 'error');
        await fetch(`${API_BASE}/api/products`, { 
            method: 'POST', 
            headers: {'Content-Type':'application/json'}, 
            body: JSON.stringify({name, price, category, features, download_link, description}) 
        });
        document.getElementById('pName').value=''; document.getElementById('pPrice').value=''; document.getElementById('pCategory').value=''; document.getElementById('pFeatures').value=''; document.getElementById('pLink').value=''; document.getElementById('pDesc').value='';
        showToast('Produk ditambahkan!'); loadProducts();
    }

    async function delProduct(id) { 
        if(confirm('Hapus produk ini?')) { 
            await fetch(`${API_BASE}/api/products`, { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({id}) }); 
            showToast('Dihapus'); loadProducts(); 
        } 
    }

    function showToast(msg) { const c = document.getElementById('toast-container'); const t = document.createElement('div'); t.className = 'toast glass rounded-xl px-4 py-2.5 text-sm text-white/80 border border-brand/20'; t.textContent = msg; c.appendChild(t); requestAnimationFrame(() => t.classList.add('show')); setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3000); }

    // INIT CHECK AUTH SAAT BUKA HALAMAN
    checkAuth();
</script>
</body>
</html>
